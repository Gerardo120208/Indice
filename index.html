<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/Control.OSMGeocoder.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/Control.OSMGeocoder.js"></script>
        <script src="data/Cartas12500000.js"></script>
        <script src="data/Cartas1500001.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        }).fitBounds([[13.050541616,-118.800902118],[33.9504308284,-85.1999464451]]);
        var hash = new L.Hash(map);
        map.attributionControl.addAttribution('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a>');
        var bounds_group = new L.featureGroup([]);
        var basemap0 = L.tileLayer('http://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="http://openstreetmap.org">OpenStreetMap</a> contributors,<a href="http://creativecommons.org/licenses/by-sa/2.0/">CC-BY-SA</a>',
            maxZoom: 28
        });
        basemap0.addTo(map);
        function setBounds() {
            map.setMaxBounds(map.getBounds());
        }
        function pop_Cartas12500000(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2"><strong>Clave</strong><br />' + (feature.properties['CLAVE'] !== null ? Autolinker.link(String(feature.properties['CLAVE'])) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2"><strong>Nombre</strong><br />' + (feature.properties['NOMBRE_HOJ'] !== null ? Autolinker.link(String(feature.properties['NOMBRE_HOJ'])) : '') + '</td>\
                    </tr>\
                </table>';
            layer.bindPopup(popupContent);
        }

        function style_Cartas12500000_0() {
            return {
                pane: 'pane_Cartas12500000',
                opacity: 1,
                color: 'rgba(0,0,0,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fillOpacity: 1,
                fillColor: 'rgba(229,153,237,0.0)',
            }
        }
        map.createPane('pane_Cartas12500000');
        map.getPane('pane_Cartas12500000').style.zIndex = 400;
        map.getPane('pane_Cartas12500000').style['mix-blend-mode'] = 'normal';
    var layer_Cartas12500000 = new L.geoJson(json_Cartas12500000, {
        attribution: '<a href=""></a>',
        pane: 'pane_Cartas12500000',
        onEachFeature: pop_Cartas12500000,
        style: style_Cartas12500000_0,
    });
        bounds_group.addLayer(layer_Cartas12500000);
        map.addLayer(layer_Cartas12500000);
        function pop_Cartas1500001(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2"><strong>Clave</strong><br />' + (feature.properties['CLAVE'] !== null ? Autolinker.link(String(feature.properties['CLAVE'])) : '') + '</td>\
                    </tr>\
                </table>';
            layer.bindPopup(popupContent);
        }

        function style_Cartas1500001_0() {
            return {
                pane: 'pane_Cartas1500001',
                opacity: 1,
                color: 'rgba(238,0,0,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fillOpacity: 1,
                fillColor: 'rgba(196,172,64,0.0)',
            }
        }
        map.createPane('pane_Cartas1500001');
        map.getPane('pane_Cartas1500001').style.zIndex = 401;
        map.getPane('pane_Cartas1500001').style['mix-blend-mode'] = 'normal';
    var layer_Cartas1500001 = new L.geoJson(json_Cartas1500001, {
        attribution: '<a href=""></a>',
        pane: 'pane_Cartas1500001',
        onEachFeature: pop_Cartas1500001,
        style: style_Cartas1500001_0,
    });
        bounds_group.addLayer(layer_Cartas1500001);
        map.addLayer(layer_Cartas1500001);
        var osmGeocoder = new L.Control.OSMGeocoder({
            collapsed: false,
            position: 'topright',
            text: 'Search',
        });
        osmGeocoder.addTo(map);
        var baseMaps = {};
        L.control.layers(baseMaps,{'<img src="legend/Cartas1500001.png" /> Cartas 1:50,000': layer_Cartas1500001,'<img src="legend/Cartas12500000.png" /> Cartas 1:250,000': layer_Cartas12500000,},{collapsed:false}).addTo(map);
        setBounds();
        </script>
    </body>
</html>
